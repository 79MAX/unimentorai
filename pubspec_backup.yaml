name: unimentorai
description: UniMentorAI - Smart Learning & Global Certification Platform
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # STATE MANAGEMENT
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ROUTING
  go_router: ^16.3.0

  # FIREBASE (ALIGNÉ)
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  cloud_functions: ^5.6.2
  firebase_analytics: ^11.6.0

  # AUTH
  google_sign_in: ^6.3.0
  flutter_secure_storage: ^9.2.4

  # NETWORK
  dio: ^5.9.0
  connectivity_plus: ^6.1.5

  # STORAGE
  shared_preferences: ^2.5.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.6

  # CORE
  intl: ^0.19.0
  uuid: ^4.5.0
  logger: ^2.7.0
  crypto: ^3.0.7
  equatable: ^2.0.8
  encrypt: ^5.0.3
  csv: ^6.0.0
  flutter_dotenv: ^5.2.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # UI
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.2
  share_plus: ^11.1.0

  # CERTIFICATION
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # PDF
  pdf: ^3.11.0
  printing: ^5.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.5.4
  freezed: ^2.5.7
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.4
  mockito: ^5.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/