<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">

  <defs>
    <!-- Subtle gold tone -->
    <linearGradient id="patternGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8C6B1E" stop-opacity="0.03"/>
    </linearGradient>

    <pattern id="geoPattern" width="60" height="60" patternUnits="userSpaceOnUse">

      <!-- Diamond (African textile inspiration, very subtle) -->
      <path d="M30 5 L45 30 L30 55 L15 30 Z"
            fill="none"
            stroke="url(#patternGold)"
            stroke-width="1"/>

      <!-- Inner cross -->
      <path d="M30 15 L30 45 M15 30 L45 30"
            stroke="url(#patternGold)"
            stroke-width="0.8"
            opacity="0.4"/>

      <!-- Small dots -->
      <circle cx="30" cy="30" r="1.2" fill="#D4AF37" opacity="0.15"/>

    </pattern>
  </defs>

  <!-- Apply pattern -->
  <rect width="400" height="400" fill="url(#geoPattern)"/>

</svg>