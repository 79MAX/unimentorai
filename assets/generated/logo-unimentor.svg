<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8E9A1"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8C6B1E"/>
    </linearGradient>

    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <circle cx="60" cy="60" r="38"
          fill="url(#blue)"
          stroke="url(#gold)"
          stroke-width="3"/>

  <!-- Knowledge core -->
  <circle cx="60" cy="60" r="10" fill="url(#gold)"/>

  <!-- Orbit (learning / AI network) -->
  <path d="M25 65 Q60 10 95 65"
        fill="none"
        stroke="url(#gold)"
        stroke-width="2"
        opacity="0.8"/>

  <circle cx="25" cy="65" r="3" fill="#D4AF37"/>
  <circle cx="95" cy="65" r="3" fill="#D4AF37"/>

  <!-- Text brand -->
  <text x="130" y="55"
        font-family="Arial"
        font-size="26"
        fill="#0B1220"
        font-weight="bold">
    UNIMENTOR
  </text>

  <text x="130" y="80"
        font-family="Arial"
        font-size="18"
        fill="#D4AF37"
        font-weight="600">
    AI
  </text>

  <!-- Tagline -->
  <text x="130" y="100"
        font-family="Arial"
        font-size="12"
        fill="#64748B">
    Global Learning Platform
  </text>
</svg>